<section class="contact" id="contact">
  <div class="contact__bg">
    <div class="contact__orb contact__orb--1"></div>
    <div class="contact__orb contact__orb--2"></div>
  </div>

  <div class="contact__container">
    <div class="section-header" data-animate="fade-up">
      <span class="section-header__tag section-header__tag--secondary">Контакти</span>
      <h2 class="section-header__title">Давайте <span class="text-gradient-accent">створимо</span> разом</h2>
      <p class="section-header__desc">Розкажіть про свій проєкт — ми зв'яжемося протягом 24 годин</p>
    </div>

    <div class="contact__grid">
      <form class="contact__form" data-animate="fade-up">
        <div class="contact__form-row">
          <input type="text" class="input" placeholder="Ваше ім'я" required>
          <input type="email" class="input" placeholder="Email" required>
        </div>
        <input type="text" class="input" placeholder="Тема проєкту">
        <textarea class="input input--textarea" placeholder="Опишіть ваш проєкт..." rows="5"></textarea>
        <button type="submit" class="btn btn--primary btn--lg btn--glow">
          Надіслати
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </form>

      <div class="contact__info" data-animate="fade-up">
        <div class="contact__info-item">
          <div class="contact__info-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          </div>
          <div>
            <span class="contact__info-label">Email</span>
            <span class="contact__info-value">hello@agency.ua</span>
          </div>
        </div>
        <div class="contact__info-item">
          <div class="contact__info-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          </div>
          <div>
            <span class="contact__info-label">Телефон</span>
            <span class="contact__info-value">+380 (XX) XXX-XX-XX</span>
          </div>
        </div>
        <div class="contact__info-item">
          <div class="contact__info-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          </div>
          <div>
            <span class="contact__info-label">Адреса</span>
            <span class="contact__info-value">Київ, Україна</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
